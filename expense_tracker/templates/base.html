<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Expense Tracker</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">💰 Expense Tracker</a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/upload">Upload</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link btn btn-danger text-white px-3 ms-2" href="/logout">
                        Logout
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- HEADER -->
<header class="hero-section text-center text-white">
    <div class="container py-4">
        <h1 class="display-5 fw-bold">Personal Finance Manager</h1>
        <p class="lead">Track • Analyze • Improve</p>
    </div>
</header>

<!-- MAIN CONTENT -->
<main class="container my-4 content-container shadow-lg p-4 rounded">
    {% block content %}{% endblock %}
</main>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center py-3 mt-5">
    <small>© 2026 Expense Tracker | Built with Flask & Bootstrap</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
